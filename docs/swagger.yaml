host: localhost:37777
info:
  contact: {}
  description: Persistent shared memory infrastructure for AI agents. Stores observations
    in PostgreSQL + pgvector, exposes MCP tools via HTTP/SSE.
  title: Engram API
  version: 1.0.0
paths:
  /api/analytics/search-misses:
    post:
      consumes:
      - application/json
      description: Returns aggregated analytics for search queries that returned zero
        results, useful for self-tuning.
      parameters:
      - description: 'Params: project (required), limit (optional)'
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: project required
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
        "503":
          description: store not available
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Get search miss analytics
      tags:
      - Search
  /api/backfill:
    post:
      consumes:
      - application/json
      description: Stores pre-extracted observations from a backfill run. Supports
        semantic deduplication via vector similarity.
      parameters:
      - description: Backfill observations
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_worker.BackfillRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_worker.BackfillResponse'
        "400":
          description: bad request
          schema:
            type: string
        "503":
          description: observation store not initialized
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Ingest backfill observations
      tags:
      - Backfill
  /api/backfill/session:
    post:
      consumes:
      - application/json
      description: Accepts raw JSONL session content, runs server-side LLM extraction,
        and stores resulting observations with semantic deduplication.
      parameters:
      - description: Session content and metadata
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_worker.BackfillSessionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_worker.BackfillSessionResponse'
        "400":
          description: bad request
          schema:
            type: string
        "503":
          description: LLM not configured or store not initialized
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Backfill session with LLM extraction
      tags:
      - Backfill
  /api/backfill/status:
    get:
      description: Returns status of all active backfill runs including stored/skipped/error
        counts per run.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_worker.BackfillStatus'
      security:
      - ApiKeyAuth: []
      summary: Get backfill status
      tags:
      - Backfill
  /api/context/count:
    get:
      description: Returns the count of observations for a project (cached).
      parameters:
      - description: Project name
        in: query
        name: project
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: project required
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Get observation count
      tags:
      - Context
  /api/context/files:
    get:
      description: Returns observations relevant to specific files being worked on,
        using vector similarity search.
      parameters:
      - description: Project name
        in: query
        name: project
        required: true
        type: string
      - description: Comma-separated file paths (max 20)
        in: query
        name: files
        required: true
        type: string
      - description: Results per file (default 10, max 50)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: bad request
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Get file context
      tags:
      - Context
  /api/context/inject:
    post:
      consumes:
      - application/json
      description: Returns context for injection at session start. Response includes
        recent (last 5), relevant (top 10 semantic), and guidance sections. Supports
        GET (deprecated) and POST. Critical startup path — optimized for speed.
      parameters:
      - description: Project name (required)
        in: query
        name: project
        type: string
      - description: Agent ID (acts as project scope if project empty)
        in: query
        name: agent_id
        type: string
      - description: 'Response format: ''compact'' for minimal payload'
        in: query
        name: format
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: project required
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Inject context for session start
      tags:
      - Context
  /api/context/search:
    get:
      consumes:
      - application/json
      description: Searches observations relevant to a user prompt using hybrid vector
        + FTS search with query expansion, cross-encoder reranking, and clustering.
        Supports both GET (query params) and POST (JSON body) to avoid URL length
        limits.
      parameters:
      - description: Project filter
        in: query
        name: project
        type: string
      - description: Search query
        in: query
        name: query
        type: string
      - description: Working directory (ignored server-side)
        in: query
        name: cwd
        type: string
      - description: Agent ID (acts as project scope if project empty)
        in: query
        name: agent_id
        type: string
      - description: Number of results (default 50, max 200)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: project and query required
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Search observations by prompt
      tags:
      - Search
  /api/decisions/search:
    post:
      consumes:
      - application/json
      description: Searches observations using decision-optimized semantic search.
        Thin REST wrapper over the search manager's Decisions method.
      parameters:
      - description: 'Search params: query, project (required), limit (optional)'
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: query and project required
          schema:
            type: string
        "500":
          description: internal error
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Search decisions
      tags:
      - Search
  /api/events/ingest:
    post:
      consumes:
      - application/json
      description: Receives raw tool events from Claude Code hooks. Stores in raw_events,
        runs deterministic Level 0 pipeline, creates an observation, and triggers
        async embedding.
      parameters:
      - description: Tool event data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_worker.IngestRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties: true
            type: object
