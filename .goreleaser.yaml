# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

project_name: engram

before:
  hooks:
    - go mod tidy
    # Generate versioned package.json from template and build Vue dashboard
    - bash -c "sed 's/{{ .Version }}/{{ .Version }}/g' ui/package.json.tpl > ui/package.json"
    - bash -c "cd ui && npm install && npm run build"
    - bash -c "rm -rf internal/worker/static && mkdir -p internal/worker/static && cp -r ui/dist/* internal/worker/static/"
    # Generate plugin config files for archives (in .claude-plugin/)
    - bash scripts/generate-plugin-config.sh

builds:
  # Server (Worker + MCP SSE)
  - id: engram-server
    main: ./cmd/worker
    binary: engram-server
    env:
      - CGO_ENABLED=1
    tags:
      - fts5
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: amd64
      - goos: linux
        goarch: arm64
      - goos: windows
        goarch: arm64

  # MCP stdio server
  - id: engram-mcp
    main: ./cmd/mcp
    binary: engram-mcp
    env:
      - CGO_ENABLED=1
    tags:
      - fts5
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: amd64
      - goos: linux
        goarch: arm64
      - goos: windows
        goarch: arm64

  # MCP stdio-to-SSE proxy (for non-HTTP MCP clients)
  - id: engram-mcp-stdio-proxy
    main: ./cmd/mcp-stdio-proxy
    binary: engram-mcp-stdio-proxy
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: amd64
      - goos: linux
        goarch: arm64
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - src: .claude-plugin/*
        dst: .claude-plugin
        strip_parent: true
      - src: plugin/engram/hooks/*.js
        dst: hooks
        strip_parent: true
      - src: plugin/engram/hooks/hooks.json
        dst: hooks
        strip_parent: true
      - src: plugin/engram/commands/*
        dst: commands
        strip_parent: true
      - src: plugin/engram/skills/*/*.md
        dst: skills
      - src: plugin/engram/.mcp.json
        dst: .
        strip_parent: true
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: thebtf
    name: engram
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  header: |
    ## Engram v{{.Version}}

    Shared memory infrastructure for Claude Code workstations.

    ### Install via Plugin Marketplace (recommended)

    ```
    /plugin marketplace add thebtf/engram-marketplace
    /plugin install engram
    ```

    Then run `/engram:setup` to configure your server connection.

    ### Install via Script

    **macOS / Linux:**
    ```bash
    curl -sSL https://raw.githubusercontent.com/thebtf/engram/main/scripts/install.sh | bash
    ```

    **Windows (PowerShell):**
    ```powershell
    irm https://raw.githubusercontent.com/thebtf/engram/main/scripts/install.ps1 | iex
    ```

    ### Server Deployment

    See [DEPLOYMENT.md](https://github.com/thebtf/engram/blob/main/docs/DEPLOYMENT.md) for Docker setup.

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true
