name: Sync Plugin to Marketplace

on:
  push:
    branches: ["main"]
    paths:
      - "plugin/**"
      - ".claude-plugin/**"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout engram
        uses: actions/checkout@v4
        with:
          path: engram

      - name: Checkout marketplace
        uses: actions/checkout@v4
        with:
          repository: thebtf/engram-marketplace
          token: ${{ secrets.MARKETPLACE_PAT }}
          path: marketplace

      - name: Sync plugin files
        run: |
          # Clear existing plugin files in marketplace (preserve .git and root files)
          cd marketplace
          rm -rf hooks skills commands .mcp.json
          rm -rf .claude-plugin

          # Copy fresh plugin files from engram
          cp -r ../engram/plugin/hooks ./hooks
          cp -r ../engram/plugin/skills ./skills
          cp -r ../engram/plugin/commands ./commands
          cp ../engram/plugin/.mcp.json ./.mcp.json
          cp -r ../engram/plugin/.claude-plugin ./.claude-plugin

      - name: Check for changes
        id: changes
        working-directory: marketplace
        run: |
          git diff --quiet && git diff --cached --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        working-directory: marketplace
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          ENGRAM_SHA=$(cd ../engram && git rev-parse --short HEAD)
          git commit -m "sync: update plugin files from engram@${ENGRAM_SHA}"
          git push
