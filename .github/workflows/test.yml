name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      # Linux and macOS: race detector enabled (requires CGO + gcc, available
      # on these platforms). Windows: race detector disabled (requires CGO
      # + MinGW, not available in windows-latest default environment).
      - name: Test (Linux / macOS — with race detector)
        if: runner.os != 'Windows'
        run: go test ./... -race -cover -coverprofile=coverage.out

      - name: Test (Windows — without race detector)
        if: runner.os == 'Windows'
        run: go test ./... -cover -coverprofile=coverage.out

      # Coverage gates — enforced on every platform that produces coverage.out.
      #
      # Honest thresholds derived from running the v4 statement-weighted check
      # against an actual local run after PR #167's loom-module landing:
      #
      # internal/module/                >= 75%  (real measurement 76.2% as of
      #                                          5d8d651; Phase A's "95.8% NFR-7"
      #                                          claim was either for a single
      #                                          sub-package or measured by a
      #                                          buggy script that sampled one
      #                                          function via tail -1)
      # internal/handlers/engramcore    >= 60%  (gRPC transport limits coverage)
      # internal/handlers/loom          >= 70%  (Phase B-1 plumbing landing;
#                                          real measurement 75.7% on the v4
#                                          coverage script. Loom error paths
#                                          (PRAGMA failure, NewEngine error,
#                                          shutdown ctx cancellation) are
#                                          hard to cover via moduletest.Harness
#                                          without a full SQLite fake. Phase
#                                          B-2 follow-up improves coverage to
#                                          85%+ once loom-tools lands and adds
#                                          its own test surface.)
      # cmd/engram/                     >= 0%   (main + wiring + exec_*.go are
      #                                          not meaningfully unit-testable;
      #                                          gate is kept at 0% as
      #                                          documentation of the package set)
      #
      # The check computes a TRUE statement-weighted coverage for a package
      # prefix by parsing the raw coverage.out file directly. Each non-header
      # line in coverage.out has the form:
      #   path:start.col,end.col numStatements covered(0/1)
      # The script sums numStatements per package prefix, sums numStatements
      # of lines where covered > 0, and reports hit/total.
      #
      # History:
      # - v1 (Phase A): used `go tool cover -func ... | tail -1`. Sampled ONE
      #   function and called it the package coverage. Reported 0% for
      #   cmd/engram/ on every run — Phase A merged with this gate red on
      #   Linux/macOS. On Windows the same script silently SKIPPED everything
      #   because `2>/dev/null` suppressed the missing-coverage.out error and
      #   awk processed empty input, so pct was empty and the gate returned
      #   "SKIP" with exit 0. Phase A therefore never actually enforced
      #   coverage on Windows at all.
      # - v2 (PR #167 first attempt): function-count-weighted average via awk
      #   over `go tool cover -func` output. Better than v1 but not the same
      #   metric Phase A claimed, and still inherited the Windows silent skip.
      # - v3 (PR #167 second attempt): statement-weighted from raw coverage.out
      #   directly. Honest on Linux/macOS but BROKE Windows hard because the
      #   silent-skip path is gone — awk fails fatally when coverage.out is
      #   missing.
      # - v4 (this version): statement-weighted on platforms where coverage.out
      #   exists; explicit WARN-and-skip on platforms where it does not (still
      #   Windows as of 2026-04-15 — root cause TBD, tracked under Phase B-2
      #   CI hardening). Gate is permissive on missing coverage.out so we
      #   don't block PRs on a pre-existing Windows-CI environmental issue.
      - name: Check coverage gates
        shell: bash
        run: |
          if [ ! -f coverage.out ]; then
            echo "WARN: coverage.out is missing on this platform — skipping all coverage gates."
            echo "WARN: this is a pre-existing issue on the Windows runner that Phase A also hit."
            echo "WARN: Linux and macOS runners produce coverage.out and enforce the gates."
            exit 0
          fi

          check_pkg() {
            local pkg="$1"
            local threshold="$2"
            local pct
            pct=$(awk -v pkg="github.com/thebtf/engram/${pkg}" '
              $1 ~ ("^" pkg) {
                n = split($0, parts, " ")
                if (n < 3) next
                stmts = parts[n-1]
                hit   = parts[n]
                total += stmts
                if (hit + 0 > 0) covered += stmts
              }
              END {
                if (total > 0) printf "%.1f\n", (covered / total) * 100
                else print ""
              }
            ' coverage.out)
            if [ -z "$pct" ]; then
              echo "SKIP: no coverage data for ${pkg} (no test files or all functions excluded)"
              return 0
            fi
            local ok
            ok=$(awk "BEGIN { print ($pct >= $threshold) ? 1 : 0 }")
            if [ "$ok" = "1" ]; then
              echo "PASS: ${pkg} stmt coverage ${pct}% >= ${threshold}%"
            else
              echo "FAIL: ${pkg} stmt coverage ${pct}% < ${threshold}% (threshold)"
              exit 1
            fi
          }

          check_pkg "internal/module/"                75
          check_pkg "internal/handlers/engramcore"    60
          check_pkg "internal/handlers/loom"          70
          check_pkg "cmd/engram/"                      0

      # Safety-gate self-check (T007, v5 cleanup).
      #
      # Validates the scripts/safety-gate.* toolchain that every cleanup PR MUST
      # pass before merging. CI cannot reach the LAN production vault endpoint
      # (`http://unleashed.lan:37777`), so this step only validates the scripts
      # themselves — NOT production invariants. Live invariant verification is
      # operator-only and runs manually on the Unraid host before merging
      # critical PRs (US3 in particular).
      #
      # What this step verifies:
      #   1. scripts/safety-gate-baseline.json is syntactically valid JSON
      #   2. On Linux/macOS: bash scripts/safety-gate_test.sh passes (5 mock tests)
      #   3. On Windows: pwsh scripts/safety-gate.ps1 -Help parses + exits 0
      #
      # What this step does NOT do:
      #   - Hit /api/vault/status (unreachable from CI)
      #   - docker exec on Unraid Postgres (no docker socket)
      #   - Compare against live entity counts
      - name: Safety gate self-check (scripts integrity)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Validate baseline JSON ==="
          if command -v jq >/dev/null 2>&1; then
            jq . scripts/safety-gate-baseline.json > /dev/null
          else
            python -c 'import json,sys; json.load(open("scripts/safety-gate-baseline.json"))'
          fi
          echo "baseline JSON: OK"

          if [ "${RUNNER_OS}" = "Windows" ]; then
            echo "=== Windows: pwsh -Help smoke ==="
            pwsh -NoProfile -File scripts/safety-gate.ps1 -Help
            echo "safety-gate.ps1: help output OK"
          else
            echo "=== Linux/macOS: bash safety-gate_test.sh ==="
            bash scripts/safety-gate_test.sh
            echo "safety-gate_test.sh: all tests passed"
          fi
