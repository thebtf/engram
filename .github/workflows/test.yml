name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      # Linux and macOS: race detector enabled (requires CGO + gcc, available
      # on these platforms). Windows: race detector disabled (requires CGO
      # + MinGW, not available in windows-latest default environment).
      - name: Test (Linux / macOS — with race detector)
        if: runner.os != 'Windows'
        run: go test ./... -race -cover -coverprofile=coverage.out

      - name: Test (Windows — without race detector)
        if: runner.os == 'Windows'
        run: go test ./... -cover -coverprofile=coverage.out

      # Coverage gates — enforced on every platform.
      # internal/module/         >= 90%  (NFR-7, G002 verified at 95.8%)
      # internal/handlers/engramcore >= 60%  (NFR-7; gRPC transport limits
      #                               unit-test coverage)
      # cmd/engram/              >= 0%   (NFR-7; main + wiring + exec_*.go are
      #                               not meaningfully unit-testable, kept as
      #                               documentation of the package set)
      #
      # The check averages function-level coverage across all functions whose
      # file path begins with the given prefix. This is approximately a
      # function-count weighted average (not statement-weighted) but it is
      # correct enough as a guard against unintended regressions and avoids
      # the "tail -1" bug that previously sampled a single function's coverage
      # and called it the package's total.
      - name: Check coverage gates
        shell: bash
        run: |
          check_pkg() {
            local pkg="$1"
            local threshold="$2"
            local pct
            pct=$(go tool cover -func=coverage.out 2>/dev/null \
              | grep "^github.com/thebtf/engram/${pkg}" \
              | grep -v "^total:" \
              | awk '{
                  gsub(/%/, "", $NF)
                  sum += $NF
                  n++
                } END {
                  if (n > 0) printf "%.1f\n", sum / n
                  else print ""
                }')
            if [ -z "$pct" ]; then
              echo "SKIP: no coverage data for ${pkg} (no test files or all functions excluded)"
              return 0
            fi
            local ok
            ok=$(awk "BEGIN { print ($pct >= $threshold) ? 1 : 0 }")
            if [ "$ok" = "1" ]; then
              echo "PASS: ${pkg} avg coverage ${pct}% >= ${threshold}%"
            else
              echo "FAIL: ${pkg} avg coverage ${pct}% < ${threshold}% (threshold)"
              exit 1
            fi
          }

          check_pkg "internal/module/"                90
          check_pkg "internal/handlers/engramcore"    60
          check_pkg "internal/handlers/loom"          80
          check_pkg "cmd/engram/"                      0
